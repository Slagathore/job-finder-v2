<!doctype html>
<html>
<head><meta charset="utf-8" /><link rel="stylesheet" href="popup.css" /></head>
<body>
  <h1>Job Finder</h1>

  <div class="sec">
    <label>Hub URL</label>
    <input id="hubUrl" placeholder="http://127.0.0.1:17893" />
    <label>Pairing token</label>
    <input id="token" type="password" placeholder="paste from app → Settings" />
    <div class="row">
      <button id="save">Save</button>
      <button id="test">Test connection</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <div class="sec">
    <button id="harvest" class="primary">Harvest this page</button>
    <div id="harvestMsg" class="status"></div>
  </div>

  <div class="sec toggles">
    <label class="chk"><input type="checkbox" id="autoHarvest" /> Auto-harvest results pages</label>
    <label class="chk"><input type="checkbox" id="fieldCapture" /> Capture apply-form answers</label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
